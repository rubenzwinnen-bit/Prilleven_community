<!doctype html>
<html lang="nl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <meta name="robots" content="noindex" />
  <title>Pril Leven — Admin Dashboard</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/styles.css" />

  <style>
    body { background: var(--color-bg); min-height: 100vh; }

    .admin-header {
      background: var(--color-primary);
      color: var(--color-white);
      padding: 1rem 1.5rem;
      box-shadow: var(--shadow-sm);
    }
    .admin-header-inner {
      max-width: 1400px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      gap: .75rem;
    }
    .admin-header a.brand {
      color: var(--color-white);
      font-weight: 700;
      font-size: 1.25rem;
      display: inline-flex;
      align-items: center;
      gap: .6rem;
      text-decoration: none;
    }
    .admin-header .brand-logo {
      height: 34px;
      width: auto;
      display: block;
    }
    .admin-header .badge {
      background: rgba(255,255,255,.2);
      padding: .15rem .6rem;
      border-radius: 999px;
      font-size: .7rem;
      font-weight: 600;
      letter-spacing: .03em;
      text-transform: uppercase;
    }
    .admin-header .back {
      margin-left: auto;
      color: var(--color-white);
      opacity: .9;
      font-size: .95rem;
      font-weight: 500;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: rgba(255,255,255,.18);
      text-decoration: none;
      transition: var(--transition);
    }
    .admin-header .back:hover { opacity: 1; background: rgba(255,255,255,.32); }

    .admin-main {
      max-width: 1400px;
      margin: 0 auto;
      padding: 1.5rem 1.5rem 3rem;
    }

    .admin-tabs {
      display: flex;
      gap: .5rem;
      border-bottom: 1px solid var(--color-light);
      margin-bottom: 1.5rem;
    }
    .admin-tab {
      padding: .75rem 1.25rem;
      border: 0;
      background: transparent;
      color: var(--color-dark-light);
      font-family: inherit;
      font-weight: 500;
      font-size: .95rem;
      cursor: pointer;
      border-bottom: 2px solid transparent;
      margin-bottom: -1px;
    }
    .admin-tab:hover { color: var(--color-dark); }
    .admin-tab.active {
      color: var(--color-primary);
      border-bottom-color: var(--color-primary);
      font-weight: 600;
    }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 1rem;
      margin-bottom: 1.5rem;
    }
    .stat-card {
      background: var(--color-white);
      padding: 1.1rem 1.25rem;
      border-radius: var(--radius-md);
      box-shadow: var(--shadow-sm);
      border: 1px solid var(--color-light);
    }
    .stat-card .label {
      font-size: .75rem;
      color: var(--color-gray);
      text-transform: uppercase;
      letter-spacing: .04em;
      font-weight: 600;
      margin-bottom: .4rem;
    }
    .stat-card .value {
      font-size: 1.75rem;
      font-weight: 700;
      color: var(--color-dark);
    }
    .stat-card .sub {
      font-size: .8rem;
      color: var(--color-gray);
      margin-top: .3rem;
    }

    .panel {
      background: var(--color-white);
      border: 1px solid var(--color-light);
      border-radius: var(--radius-md);
      box-shadow: var(--shadow-sm);
      margin-bottom: 1.5rem;
      overflow: hidden;
    }
    .panel-header {
      padding: 1rem 1.25rem;
      border-bottom: 1px solid var(--color-light);
      display: flex;
      align-items: center;
      gap: .75rem;
    }
    .panel-header h3 {
      font-size: 1rem;
      margin: 0;
    }
    .panel-header .muted {
      font-size: .8rem;
      color: var(--color-gray);
      margin-left: auto;
    }
    .panel-body { overflow-x: auto; }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: .88rem;
    }
    thead th {
      text-align: left;
      padding: .65rem 1rem;
      background: var(--color-bg);
      font-weight: 600;
      color: var(--color-dark-light);
      font-size: .75rem;
      text-transform: uppercase;
      letter-spacing: .03em;
      border-bottom: 1px solid var(--color-light);
      white-space: nowrap;
    }
    tbody td {
      padding: .65rem 1rem;
      border-bottom: 1px solid var(--color-light);
      vertical-align: top;
    }
    tbody tr:hover { background: var(--color-bg); }

    .pill {
      display: inline-flex;
      padding: .15rem .55rem;
      border-radius: 999px;
      font-size: .72rem;
      font-weight: 600;
    }
    .pill.ok { background: rgba(130,190,147,.2); color: #3d6e50; }
    .pill.warn { background: rgba(241,196,15,.25); color: #92700c; }
    .pill.err { background: rgba(192,57,43,.2); color: var(--color-danger-dark); }
    .pill.gray { background: var(--color-light); color: var(--color-dark-light); }

    .search-input {
      width: 260px;
      padding: .5rem .75rem;
      border: 1px solid var(--color-gray-light);
      border-radius: var(--radius-md);
      font-family: inherit;
      font-size: .9rem;
    }
    .search-input:focus {
      outline: none;
      border-color: var(--color-primary);
    }

    .loading, .empty {
      padding: 2rem;
      text-align: center;
      color: var(--color-gray);
    }
    .error-box {
      padding: 1.5rem;
      background: #fdecea;
      border: 1px solid #f5c6cb;
      color: var(--color-danger-dark);
      border-radius: var(--radius-md);
      margin-bottom: 1rem;
    }

    .row-details {
      font-size: .75rem;
      color: var(--color-gray);
      margin-top: .25rem;
    }

    .tab-content { display: none; }
    .tab-content.active { display: block; }

    /* Responsive */
    @media (max-width: 800px) {
      .admin-main { padding: 1rem; }
      .stats-grid { grid-template-columns: 1fr 1fr; }
    }
  </style>
</head>
<body>
  <header class="admin-header">
    <div class="admin-header-inner">
      <a class="brand" href="/">
        <img src="/pril-leven-logo.png" alt="" class="brand-logo" />
        <span>Community Pril Leven</span>
      </a>
      <span class="badge">Admin</span>
      <a class="back" href="/" title="Naar het hub" aria-label="Naar het hub">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9.5 12 3l9 6.5V21a1 1 0 0 1-1 1h-5v-7h-6v7H4a1 1 0 0 1-1-1V9.5Z"/></svg>
      </a>
    </div>
  </header>

  <main class="admin-main">
    <div id="gate" class="loading">Toegang controleren…</div>

    <div id="dashboard" style="display:none;">
      <div class="admin-tabs">
        <button class="admin-tab active" data-tab="overview">Overzicht</button>
        <button class="admin-tab" data-tab="users">Gebruikers</button>
        <button class="admin-tab" data-tab="queries">Recente vragen</button>
        <button class="admin-tab" data-tab="events">Abonnement-events</button>
      </div>

      <!-- Overview -->
      <div id="tab-overview" class="tab-content active">
        <div id="global-stats" class="loading">Laden…</div>
      </div>

      <!-- Users -->
      <div id="tab-users" class="tab-content">
        <div class="panel">
          <div class="panel-header">
            <h3>Gebruikers</h3>
            <input type="text" class="search-input" id="users-search" placeholder="Zoek op email…" />
            <span class="muted" id="users-count"></span>
          </div>
          <div class="panel-body">
            <div id="users-table" class="loading">Laden…</div>
          </div>
        </div>
      </div>

      <!-- Recent queries -->
      <div id="tab-queries" class="tab-content">
        <div class="panel">
          <div class="panel-header">
            <h3>Laatste vragen</h3>
            <span class="muted">Laatste 50 assistant-antwoorden</span>
          </div>
          <div class="panel-body">
            <div id="queries-table" class="loading">Laden…</div>
          </div>
        </div>
      </div>

      <!-- Subscription events -->
      <div id="tab-events" class="tab-content">
        <div class="panel">
          <div class="panel-header">
            <h3>Abonnement-events</h3>
            <input type="text" class="search-input" id="events-search" placeholder="Filter op email…" />
          </div>
          <div class="panel-body">
            <div id="events-table" class="loading">Laden…</div>
          </div>
        </div>
      </div>
    </div>
  </main>

  <script src="/js/admin-chat.js" type="module"></script>
</body>
</html>
